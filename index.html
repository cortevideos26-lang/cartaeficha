<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limpa Ficha - Cash Back</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🔄 Limpa Ficha</h1>
    <p class="subtitle">Cole a ficha extraída do painel e gere a mensagem formatada de Cash Back</p>

    <div class="grid">
        <div>
            <div class="card">
                <label>📋 Ficha Original</label>
                <textarea id="inputFicha" placeholder="Cole a ficha aqui..."></textarea>
                <div class="field-group">
                    <label>💲 Cash Back</label>
                    <div class="cashback-row">
                        <input type="text" id="valorCashback" placeholder="Valor calculado">
                        <input type="number" id="porcentagem" value="30" min="0" max="100" step="0.1">
                        <span class="percent-label">%</span>
                    </div>
                </div>
            </div>
            <div class="card template-card">
                <div class="template-header" onclick="toggleTemplate()">
                    <label>✏️ Customizar Mensagem</label>
                    <span class="toggle-icon" id="toggleIcon">▶</span>
                </div>
                <div class="template-body" id="templateBody">
                    <p class="template-hint">Use as variáveis: <code>{tratamento}</code> <code>{nome}</code> <code>{cpf}</code> <code>{valor}</code> <code>{data}</code></p>
                    <textarea id="templateTexto">Olá, {tratamento},

Aqui é do Setor de Cash Back da Telha Norte.

Informamos que, devido ao feriado, ocorreu uma pequena instabilidade em nossos sistemas de processamento e liberação de valores. No entanto, nossa equipe já realizou os ajustes necessários e a normalização completa está prevista para amanhã, {data}.

Dados do benefício:
Cliente: {nome}
CPF:  {cpf}
Valor de Cash Back: {valor}

Solicitamos que aguarde mais orientações. Assim que o sistema estiver totalmente normalizado, todos os Cash Backs pendentes serão liberados através do Portal Tnorte.

Agradecemos sua compreensão e permanecemos à disposição para quaisquer esclarecimentos.

Atenciosamente,
Setor de Cash Back
Portal Tnorte</textarea>
                </div>
            </div>
        </div>

        <div>
            <div class="card">
                <div class="preview-header">
                    <label>📨 Mensagem Gerada</label>
                    <span class="char-count" id="charCount">0 caracteres</span>
                </div>
                <div class="output-area" id="outputMensagem">Aguardando ficha...</div>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="gerar()">🔄 Gerar</button>
                    <button class="btn btn-success" onclick="copiarMsg()">📋 Copiar Msg</button>
                    <button class="btn btn-whats" onclick="chamarWhats()">📱 Chamar WhatsApp</button>
                    <button class="btn btn-copy" onclick="copiarNumero()">🔢 Copiar Nº</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
